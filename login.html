<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stryde — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<div class="auth-page">

  <!-- ══════════════════════════════
       LEFT — Visual panel
  ═══════════════════════════════ -->
  <div class="auth-visual" aria-hidden="true">
    <div class="auth-visual-bg"></div>
    <div class="auth-visual-overlay"></div>
    <div class="auth-visual-content">

      <!-- Logo -->
      <a href="index.html" class="auth-visual-logo">STRYDE</a>

      <!-- Bottom tagline -->
      <div>
        <p class="auth-visual-tagline">
          Move<br>
          <span class="dim">Without Limits</span>
        </p>
        <p class="auth-visual-sub">Performance built from the ground up.</p>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════
       RIGHT — Login form
  ═══════════════════════════════ -->
  <div class="auth-form-panel">
    <div class="auth-form-inner">

      <!-- Header -->
      <p class="auth-form-eyebrow">Welcome back</p>
      <h1 class="auth-form-title">Login</h1>

      <!-- Top alert banner (shown by JS) -->
      <div class="auth-alert" id="authAlert" role="alert" aria-live="polite"></div>

      <!-- Form -->
      <form id="loginForm" novalidate>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="your@email.com"
            autocomplete="email"
            required
          />
          <p class="field-error" id="emailError"></p>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
              <!-- Eye icon (default) -->
              <svg viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="field-error" id="passwordError"></p>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-auth" id="loginBtn">
          <span>Login</span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>

      </form>

      <!-- Switch to signup -->
      <p class="auth-switch">
        Don't have an account?
        <a href="signup.html">Sign up</a>
      </p>

    </div>
  </div>

</div><!-- /auth-page -->

<script src="js/auth.js"></script>
</body>
</html>
